name: Otonom Strateji ve Video Fabrikası

on:
  schedule:
    - cron: '0 2 * * *' # Her gece 02:00'de otomatik çalışır
  workflow_dispatch: # İstediğinde manuel başlatabilmen için

jobs:
  strateji-planla:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kutuphaneleri Kur
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai pyjwt requests pandas plotly streamlit edge-tts
          # TikTok yükleyici için gerekli bağımlılık (Eğer kütüphanen özelse ismini kontrol et)
          pip install tiktok-uploader || echo "TikTok uploader yuklenemedi, manuel kontrol et"

      - name: 🧹 Eski Videoları Temizle (7 Günlük)
        run: |
          # 7 günden eski mp4'leri bul ve sil
          find . -name "video_*.mp4" -mtime +7 -exec rm {} \;
          echo "Eski arşiv temizlendi, yer açıldı."

      - name: 🧠 Fikir ve Strateji Üret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python fikir_ureteci.py

      - name: 🎬 Kling ile Video Üret (V2.5-Turbo Pro)
        env:
          KLING_ACCESS_KEY: ${{ secrets.KLING_ACCESS_KEY }}
          KLING_SECRET_KEY: ${{ secrets.KLING_SECRET_KEY }}
        # Bakiye biterse veya API hata verirse tüm süreci bozmasın diye || true
        run: python video_ureteci.py || true

      - name: 📱 TikTok'a Otomatik Yükle
        env:
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
        run: python tiktok_yukleyici.py || true

      - name: 💾 Değişiklikleri Depoya Mühürle
        run: |
          git config --global user.name "Autonomous-Bot"
          git config --global user.email "actions@github.com"
          
          # Yeni strateji dosyasını ve yeni üretilen videoları ekle
          git add son_strateji.txt
          git add video_*.mp4 || true
          
          # Sadece değişiklik varsa commit yap, hata almamak için kontrol ekle
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "🚀 Otomatik Güncelleme: $(date +'%d-%m-%Y %H:%M')"
            git push
          else
            echo "Kaydedilecek yeni bir değişiklik yok."
          fi
