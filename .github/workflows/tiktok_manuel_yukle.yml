name: TikTok Manuel Yukle (Kredi Harcamaz)

on:
  workflow_dispatch:

jobs:
  yukle:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kutuphaneleri Kur
        run: |
          pip install requests tiktok-uploader
          # 🛠️ TARAYICI SÜRÜCÜLERİNİ VE SİSTEM BAĞIMLILIKLARINI KUR
          python -m playwright install chromium
          sudo npx playwright install-deps chromium

      - name: 📱 Sadece TikTok'a Yukle
        env:
          # 🗝️ Burası robotun GitHub kasasından (Secrets) veri çekmesini sağlar
          TIKTOK_SESSION_ID: ${{ secrets.TIKTOK_SESSION_ID }}
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }} # ✅ BU SATIR EKLENDİ
        run: |
          # 🖥️ XVFB-RUN KOMUTU İLE SANAL EKRAN OLUŞTURUYORUZ
          xvfb-run python tiktok_yukleyici.py
