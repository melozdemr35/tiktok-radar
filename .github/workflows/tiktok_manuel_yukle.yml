name: TikTok Manuel Yukle (Kredi Harcamaz)

on:
  workflow_dispatch:

jobs:
  yukle:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kutuphaneleri Kur
        run: |
          pip install requests tiktok-uploader
          python -m playwright install chromium
          sudo npx playwright install-deps chromium

      - name: 📱 Sadece TikTok'a Yukle
        env:
          TIKTOK_COOKIES_TXT: ${{ secrets.TIKTOK_COOKIES_TXT }}
        run: |
          xvfb-run --server-args="-screen 0 1920x1080x24" python tiktok_yukleyici.py

      # 📸 İŞTE YENİ KISIM: Hata olursa fotoğrafları buraya tıkla indir diyecek
      - name: 🖼️ Ekran Goruntulerini Yukle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-hata-fotograflari
          path: "*.png"
