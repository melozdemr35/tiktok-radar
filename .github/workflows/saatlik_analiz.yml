name: 🕵️‍♂️ Tam Otonom TikTok Casusu ve Kuryesi

on:
  schedule:
    # 🕒 Her saat başı uyanır (00:00, 01:00, 02:00...)
    - cron: '0 * * * *'
  workflow_dispatch: # Manuel çalıştırma hakkın her zaman kalsın

permissions:
  contents: write # Veritabanını ve resimleri kaydedebilmesi için

jobs:
  otonom_islem:
    runs-on: ubuntu-latest
    timeout-minutes: 90 # 60 dakikalık casusluk + 10 dakikalık yükleme için yeterli
    
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0 

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Kütüphaneleri Kur
        run: |
          pip install --no-cache-dir google-generativeai playwright pandas requests tiktok-uploader pyjwt
          playwright install --with-deps chromium

      - name: 🕵️‍♂️ TikTok'tan Veri Çek ve Analiz Et
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TIKTOK_SESSION_1: ${{ secrets.TIKTOK_SESSION_1 }}
          TIKTOK_SESSION_2: ${{ secrets.TIKTOK_SESSION_2 }}
          TIKTOK_SESSION_3: ${{ secrets.TIKTOK_SESSION_3 }}
          TIKTOK_SESSION_4: ${{ secrets.TIKTOK_SESSION_4 }}
          TIKTOK_SESSION_5: ${{ secrets.TIKTOK_SESSION_5 }}
        run: |
          # Senin meşhur 60 dakikalık casusluk döngün başlar
          python otonom_motor.py

      - name: 📱 TikTok'a Sevkiyat (Saati Geldiyse)
        env:
          TIKTOK_COOKIES_TXT: ${{ secrets.TIKTOK_COOKIES_TXT }}
        run: |
          # Kurye uyanır, saati kontrol eder. 
          # Eğer o an analizdeki 'Viral Saat' değilse hiçbir şey yüklemez.
          xvfb-run --server-args="-screen 0 1920x1080x24" python tiktok_yukleyici.py

      - name: 💾 Verileri ve Kanıtları GitHub'a Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Trendleri, analizi ve robotun hata fotoğraflarını ekle
          git add trend_veritabani.json son_analiz.txt son_strateji.txt *.png || true
          
          git commit -m "🕵️‍♂️ Otonom Güncelleme ve Sevkiyat Kontrolü [$(date)]" || echo "Degisiklik yok"
          
          # Çakışmaları önlemek için 'theirs' stratejisiyle birleştir
          git pull origin main --strategy-option=theirs --no-rebase || echo "Pull atlandı"
          git push origin main --force
