name: Tam Otonom TikTok Casusu

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı otomatik çalışır
  workflow_dispatch: # Manuel çalıştırman için buton ekler

permissions:
  contents: write # Robotun yeni verileri kaydedebilmesi için ŞART!

jobs:
  otonom_islem:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0 

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kütüphaneleri Kur
        run: |
          pip install playwright pandas google-generativeai
          playwright install chromium
          playwright install-deps

      - name: TikTok'tan Video Çek ve Analiz Et
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python otonom_motor.py

      - name: Değişiklikleri GitHub'a Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Hata Veren Rebase Yerine: Önce uzak sunucu bağlantısını doğrula
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          # Dosyaları ekle
          git add trend_veritabani.json son_analiz.txt
          
          # Değişiklikleri kaydet (Hata varsa geç)
          git commit -m "Otonom Veri Güncellemesi [$(date)]" || echo "Degisiklik yok"
          
          # Önce uzak sunucuyla senkronize ol, çakışma varsa bizimkini üstün tut
          git pull origin main --strategy-option=theirs --no-rebase || echo "Pull atlandı"
          
          # ZORLA GÖNDER (Kilidi Kırma Hamlesi)
          git push origin main --force
