name: Tam Otonom TikTok Casusu

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı otomatik çalışır
  workflow_dispatch: # Manuel çalıştırman için buton ekler

permissions:
  contents: write # Robotun yeni verileri kaydedebilmesi için ŞART!

jobs:
  otonom_islem:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v3
        with:
          persist-credentials: true # Kimlik bilgilerini sakla (Push için önemli)

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kütüphaneleri Kur
        run: |
          pip install playwright pandas google-generativeai
          playwright install chromium
          playwright install-deps

      - name: TikTok'tan Video Çek ve Analiz Et
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python otonom_motor.py

      - name: Değişiklikleri GitHub'a Kaydet
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add trend_veritabani.json son_analiz.txt
          git commit -m "Otonom Veri ve Analiz Güncellemesi [$(date)]" || echo "Değişiklik yok"
          git push origin main
