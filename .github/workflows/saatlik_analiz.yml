name: Tam Otonom TikTok Casusu

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı
  workflow_dispatch:

jobs:
  otonom_islem:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Tarayıcı ve Sürücüleri Kur
        run: |
          pip install playwright pandas google-generativeai
          playwright install chromium
          playwright install-deps

      - name: TikTok'tan Video Çek ve Analiz Et
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python otonom_motor.py

      - name: Değişiklikleri GitHub'a Kaydet
        run: |
          git config --global user.name 'TikTok-Otonom-Bot'
          git config --global user.email 'bot@github.com'
          git add .
          git commit -m "Otonom Veri ve Analiz Güncellemesi" || exit 0
          git push
